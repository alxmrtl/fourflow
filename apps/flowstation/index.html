<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowStation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --self:    #FF6F61;
  --space:   #6BA292;
  --story:   #5B84B1;
  --spirit:  #7A4DA4;
  --bg:      #0a0a0a;
  --text:    #f0f0f0;
  --muted:   rgba(255,255,255,0.38);
  --dim:     rgba(255,255,255,0.12);
  --border:  rgba(255,255,255,0.08);
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ══ LAYOUT ════════════════════════════════════════════════ */

#screen-track {
  display: flex;
  width: 300vw;
  height: 100vh;
  will-change: transform;
  transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
}

.screen {
  width: 100vw;
  height: 100vh;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* ══ TOP BAR ══════════════════════════════════════════════ */

#top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 10px 16px;
  z-index: 200;
  pointer-events: none;
  background: linear-gradient(to bottom, rgba(10,10,10,0.97) 65%, transparent);
}

.tab {
  flex: 1;
  max-width: 180px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  height: 60px;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.28);
  transition: all 0.22s;
  border: 2px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.02);
}
.tab.active {
  color: #0a0a0a;
  background: #f0f0f0;
  border-color: #f0f0f0;
  letter-spacing: 0.16em;
}
.tab-icon {
  width: 18px; height: 18px;
  opacity: 0.55;
  flex-shrink: 0;
  transition: opacity 0.22s;
}
.tab.active .tab-icon { opacity: 1; }

#clock {
  position: fixed;
  top: 21px; right: 28px;
  font-size: 13px;
  font-weight: 400;
  color: var(--muted);
  z-index: 201;
  font-variant-numeric: tabular-nums;
}

/* ══ BOTTOM BAR ════════════════════════════════════════════ */

#bottom-bar {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 20px;
  z-index: 200;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  padding: 10px 20px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  transition: opacity 0.3s;
  white-space: nowrap;
}
#hints-row {
  display: flex;
  align-items: center;
  gap: 20px;
}

.hint-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  color: rgba(255,255,255,0.28);
  letter-spacing: 0.07em;
  font-weight: 500;
}
.hint-key {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 5px;
  padding: 3px 8px;
  font-size: 10px;
  font-family: monospace;
  color: rgba(255,255,255,0.60);
  letter-spacing: 0;
}
#gp-status {
  font-size: 10px;
  font-weight: 700;
  color: rgba(255,255,255,0.20);
  letter-spacing: 0.12em;
}
#gp-status.on { color: rgba(107,162,146,0.80); }

/* ══ MAPPING MODAL ══════════════════════════════════════════ */

#mapping-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.72);
  z-index: 300;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
#mapping-modal.open { display: flex; }

#mapping-panel {
  width: 680px;
  max-height: 82vh;
  background: #111;
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 18px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#mapping-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}
#mapping-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.40);
  margin-bottom: 14px;
}
#mapping-tabs {
  display: flex;
  gap: 8px;
}
.map-tab {
  padding: 7px 16px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.28);
  border: 1px solid rgba(255,255,255,0.10);
  background: transparent;
  cursor: default;
  transition: all 0.15s;
}
.map-tab.active {
  color: #0a0a0a;
  background: #f0f0f0;
  border-color: #f0f0f0;
}

#mapping-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
#mapping-body::-webkit-scrollbar { width: 4px; }
#mapping-body::-webkit-scrollbar-track { background: transparent; }
#mapping-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

.map-row {
  display: flex;
  align-items: center;
  padding: 11px 24px;
  gap: 12px;
  border: 1px solid transparent;
  border-radius: 8px;
  margin: 0 8px;
  transition: border-color 0.12s, background 0.12s;
}
.map-row.focused {
  border-color: rgba(255,255,255,0.28);
  background: rgba(255,255,255,0.04);
}
.map-btn-name {
  width: 90px;
  font-size: 12px;
  font-weight: 600;
  font-family: monospace;
  color: rgba(255,255,255,0.55);
  flex-shrink: 0;
}
.map-arrow {
  color: rgba(255,255,255,0.18);
  font-size: 14px;
  flex-shrink: 0;
}
.map-action {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.80);
}
.map-action.inherited {
  color: rgba(255,255,255,0.30);
  font-style: italic;
}
.map-action.none-action {
  color: rgba(255,255,255,0.18);
}
.map-row.ctrl-row { opacity: 0.45; }
.map-row.ctrl-row.focused { opacity: 0.70; }

.map-override-badge {
  margin-left: auto;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.22);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 4px;
  padding: 2px 6px;
}

/* Action picker — replaces body content */
#action-picker {
  padding: 8px 0;
}
.pick-row {
  display: flex;
  align-items: center;
  padding: 10px 24px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.55);
  border: 1px solid transparent;
  border-radius: 8px;
  margin: 0 8px;
  transition: border-color 0.12s, background 0.12s;
}
.pick-row.focused {
  border-color: rgba(255,255,255,0.28);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.90);
}
.pick-current-mark {
  margin-left: auto;
  font-size: 10px;
  color: rgba(107,162,146,0.80);
  font-weight: 700;
}
#pick-header {
  padding: 12px 24px 8px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.28);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 4px;
}

#mapping-footer {
  padding: 14px 24px;
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex;
  gap: 20px;
  flex-shrink: 0;
}
.map-hint {
  font-size: 10px;
  color: rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  gap: 6px;
}
.map-hint-key {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 4px;
  padding: 2px 7px;
  font-family: monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.50);
}

/* ══ DEBUG OVERLAY ══════════════════════════════════════════ */

#debug-overlay {
  display: none;
  position: fixed;
  top: 72px; right: 16px;
  width: 280px;
  background: rgba(0,0,0,0.88);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 14px;
  z-index: 500;
  font-size: 10px;
  font-family: monospace;
  color: var(--muted);
}
#debug-overlay.visible { display: block; }
#debug-title { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--space); margin-bottom: 10px; }
#debug-btns { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.dbtn { padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.02); font-size: 9px; color: rgba(255,255,255,0.3); transition: all 0.08s; }
.dbtn.pressed { background: var(--space); border-color: var(--space); color: #000; font-weight: 700; }
#debug-axes { font-size: 9px; color: rgba(255,255,255,0.25); line-height: 1.7; }
#debug-last { margin-top: 8px; font-size: 10px; color: var(--text); border-top: 1px solid var(--border); padding-top: 8px; }

/* ══ SCREEN 0 — BREATH ═════════════════════════════════════ */

#breath-selector {
  display: flex; flex-direction: column; align-items: center; gap: 22px;
  width: min(1020px, 94vw);
}
#bp-header {
  font-size: 11px; font-weight: 800; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--muted); align-self: flex-start;
}
#bp-grid {
  display: flex; gap: 16px; width: 100%;
}
.bp-card {
  flex: 1;
  background: rgba(255,255,255,0.03);
  border: 2px solid rgba(255,255,255,0.08);
  border-radius: 24px; padding: 28px 18px 26px;
  display: flex; flex-direction: column; align-items: center;
  text-align: center; gap: 12px;
  transition: transform 0.22s ease, box-shadow 0.22s ease,
              background 0.22s ease, border-color 0.22s ease, opacity 0.22s ease;
  position: relative; overflow: hidden; min-height: 250px;
  opacity: 0.55; cursor: default;
}
.bp-card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 45%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.08), transparent);
  pointer-events: none; border-radius: 24px 24px 0 0;
  opacity: 0; transition: opacity 0.22s;
}
.bp-card.focused { opacity: 1; transform: translateY(-7px) scale(1.04); }
.bp-card.focused::after { opacity: 1; }
.bp-icon-wrap {
  width: 68px; height: 68px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: transform 0.22s ease; position: relative; z-index: 1;
}
.bp-card.focused .bp-icon-wrap { transform: scale(1.15); }
.bp-icon-wrap svg { width: 52px; height: 52px; }
.bp-card-tag {
  font-size: 10px; font-weight: 800; letter-spacing: 0.20em; text-transform: uppercase;
  opacity: 0.65; position: relative; z-index: 1; transition: opacity 0.22s;
}
.bp-card.focused .bp-card-tag { opacity: 1; }
.bp-card-name {
  font-size: 17px; font-weight: 800; line-height: 1.2;
  position: relative; z-index: 1;
}
.bp-card-timing {
  font-size: 13px; font-weight: 600; letter-spacing: 0.05em;
  color: rgba(255,255,255,0.35); position: relative; z-index: 1;
  transition: color 0.22s; font-variant-numeric: tabular-nums;
}
.bp-card.focused .bp-card-timing { color: rgba(255,255,255,0.70); }
.bp-card-desc {
  font-size: 13px; color: var(--muted); line-height: 1.4;
  position: relative; z-index: 1; transition: color 0.22s;
}
.bp-card.focused .bp-card-desc { color: rgba(255,255,255,0.65); }
.bp-card-start {
  font-size: 10px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase;
  opacity: 0; transition: opacity 0.18s; margin-top: auto;
  position: relative; z-index: 1;
}
.bp-card.focused .bp-card-start { opacity: 1; }

/* Cycle picker */
#bp-cycles-row {
  display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%;
}
#bp-cycles-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(255,255,255,0.22); transition: color 0.20s;
}
#bp-cycles-row.row-focused #bp-cycles-label { color: rgba(255,255,255,0.65); }
#bp-cycles-pills {
  display: flex; gap: 10px;
  background: rgba(255,255,255,0.02);
  border: 2px solid rgba(255,255,255,0.06);
  border-radius: 50px; padding: 8px 18px;
  transition: border-color 0.20s, background 0.20s;
}
#bp-cycles-row.row-focused #bp-cycles-pills {
  border-color: rgba(255,255,255,0.22); background: rgba(255,255,255,0.04);
}
.bp-cyc-opt {
  font-size: 15px; font-weight: 600; letter-spacing: 0.04em;
  color: rgba(255,255,255,0.22);
  padding: 6px 20px; border-radius: 40px;
  border: 2px solid transparent; transition: all 0.20s;
}
.bp-cyc-opt.sel {
  color: var(--text); border-color: rgba(255,255,255,0.40);
  background: rgba(255,255,255,0.08);
}

/* Active session */
#breath-active { display: none; flex-direction: column; align-items: center; gap: 32px; }
#breath-circle-wrap { position: relative; width: 320px; height: 320px; }
.b-ring { position: absolute; border-radius: 50%; will-change: transform; transition: transform 0.3s ease-out; }
#br-outer { inset: -22px; border: 1px solid rgba(107,162,146,0.10); }
#br-mid   { inset: -8px;  border: 1px solid rgba(107,162,146,0.18); }
#br-main  { inset: 0; border: 3px solid rgba(107,162,146,0.70); background: radial-gradient(circle, rgba(107,162,146,0.24) 0%, rgba(122,77,164,0.08) 100%); }
#breath-labels { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
#b-phase { font-size: 44px; font-weight: 700; letter-spacing: 0.02em; transition: font-size 0.2s; }
#b-phase.countdown { font-size: 80px; font-weight: 200; }
#b-cycle { font-size: 13px; color: var(--muted); letter-spacing: 0.10em; text-transform: uppercase; font-weight: 600; }
#b-pname { font-size: 14px; color: var(--muted); letter-spacing: 0.06em; }

/* ══ SCREEN 1 — TIMER ══════════════════════════════════════ */

@keyframes pillarCycle {
  0%   { background: radial-gradient(ellipse 70% 50% at 30% 40%, rgba(255,111,97,0.13) 0%, transparent 70%); }
  25%  { background: radial-gradient(ellipse 70% 50% at 70% 40%, rgba(107,162,146,0.13) 0%, transparent 70%); }
  50%  { background: radial-gradient(ellipse 70% 50% at 70% 60%, rgba(91,132,177,0.13) 0%, transparent 70%); }
  75%  { background: radial-gradient(ellipse 70% 50% at 30% 60%, rgba(122,77,164,0.13) 0%, transparent 70%); }
  100% { background: radial-gradient(ellipse 70% 50% at 30% 40%, rgba(255,111,97,0.13) 0%, transparent 70%); }
}
#timer-ambient { position: absolute; inset: 0; pointer-events: none; animation: pillarCycle 18s ease-in-out infinite; }
#timer-time {
  font-size: clamp(140px, 16vw, 196px);
  font-weight: 200;
  letter-spacing: -0.04em;
  line-height: 1;
  position: relative; z-index: 1;
  transition: color 0.5s;
  font-variant-numeric: tabular-nums;
}
#timer-dur-row { display: flex; gap: 14px; margin-top: 28px; position: relative; z-index: 1; }
.dur-opt {
  font-size: 14px; font-weight: 600;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.22);
  padding: 8px 22px;
  border-radius: 24px;
  border: 2px solid transparent;
  transition: all 0.2s;
}
.dur-opt.sel {
  color: var(--text);
  border-color: rgba(255,255,255,0.42);
  background: rgba(255,255,255,0.06);
}
#timer-state {
  position: relative;
  margin-bottom: 6px;
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--muted); z-index: 1;
}
#rep-zone { position: absolute; bottom: 68px; display: flex; flex-direction: column; align-items: center; gap: 6px; z-index: 1; }
#rep-num { font-size: 88px; font-weight: 800; line-height: 1; transition: transform 0.08s; font-variant-numeric: tabular-nums; }
#rep-num.pop { transform: scale(1.28); }
#rep-lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); }
#struggle-bar { position: absolute; bottom: 0; left: 0; height: 4px; width: 0%; background: var(--self); opacity: 0; transition: width 1s linear, opacity 0.6s; }

/* ══ SCREEN 2 — COMPENDIUM ══════════════════════════════════
   Three sub-views: GRID → STATE → CARD
   Each fills #s-compendium. Transitions driven by JS.
══════════════════════════════════════════════════════════ */

#s-compendium { align-items: stretch; justify-content: stretch; }

/* — shared — */
.cmp-view {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  padding: 72px 36px 58px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.28s ease, transform 0.28s ease;
  transform: translateX(20px);
}
.cmp-view.active {
  opacity: 1;
  pointer-events: all;
  transform: translateX(0);
}
.cmp-view.exit-left  { transform: translateX(-20px); opacity: 0; }
.cmp-view.exit-right { transform: translateX(20px);  opacity: 0; }

/* — GRID view — */
#cmp-grid-view {}

#cmp-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  flex: 1;
  min-height: 0;
}

.g-col {
  display: flex;
  flex-direction: column;
  gap: 10px;
  opacity: 0.55;
  transition: opacity 0.28s ease, background 0.28s ease;
  border-radius: 24px;
  padding: 20px 14px 16px;
}
.g-col.focused { opacity: 1; }

.g-col-header {
  font-size: 13px; font-weight: 800;
  letter-spacing: 0.20em; text-transform: uppercase;
  padding-bottom: 16px; margin-bottom: 14px;
  border-bottom: 2px solid currentColor;
  flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
}
.g-col-header-logo {
  width: 28px; height: 28px;
  object-fit: contain;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
  mix-blend-mode: screen;
  flex-shrink: 0;
}
.g-col-count {
  font-size: 10px; letter-spacing: 0.05em;
  opacity: 0.45; font-weight: 500;
  margin-left: auto;
}

/* State card tile */
.g-state-row {
  flex: 1;
  padding: 14px 12px 12px;
  border-radius: 20px;
  border: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  text-align: center;
  transition: transform 0.20s ease, box-shadow 0.20s ease, background 0.20s ease;
  cursor: default;
  position: relative;
  overflow: hidden;
}
.g-state-row::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 40%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.10), transparent);
  pointer-events: none;
  border-radius: 20px 20px 0 0;
  opacity: 0;
  transition: opacity 0.20s;
}
.g-state-row.focused::after { opacity: 1; }
.g-state-row.focused {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 12px 36px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.3);
}

/* State name (top) */
.g-state-name {
  font-size: 14px; font-weight: 800;
  letter-spacing: 0.14em; text-transform: uppercase;
  line-height: 1.3;
  color: rgba(255,255,255,0.95);
  position: relative; z-index: 1;
  flex-shrink: 0;
}

/* Icon (center) */
.g-state-icon-wrap {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 8px 0;
  position: relative; z-index: 1;
}
.g-state-icon {
  width: 84px; height: 84px;
  object-fit: contain;
  filter: drop-shadow(0 3px 10px rgba(0,0,0,0.50));
  transition: transform 0.20s ease, filter 0.20s ease;
}
.g-state-row.focused .g-state-icon {
  transform: scale(1.10);
  filter: drop-shadow(0 4px 14px rgba(0,0,0,0.65));
}

/* Quality bar (bottom) */
.g-state-qual-bottom {
  display: flex;

function loadMapping() {
  try {
    const saved = localStorage.getItem('flowstation-mapping');
    if (saved) {
      const parsed = JSON.parse(saved);
      return {
        global: Object.assign({}, DEFAULT_MAPPING.global, parsed.global || {}),
        0: parsed[0] || {},
        1: parsed[1] || {},
        2: parsed[2] || {},
      };
    }
  } catch(e) {}
  return { global: {...DEFAULT_MAPPING.global}, 0:{}, 1:{}, 2:{} };
}

function saveMapping() {
  localStorage.setItem('flowstation-mapping', JSON.stringify(mapping));
}

function getAction(edgeKey) {
  const screenOverride = mapping[currentScreen]?.[edgeKey];
  if (screenOverride !== undefined) return screenOverride;
  return mapping.global[edgeKey] || null;
}

const mapEd = {
  open: false,
  tabIdx: 0,      // 0=global 1=Compendium 2=Breath 3=Timer
  rowIdx: -1,     // -1 = nothing selected; ≥0 = that row is highlighted
  picking: false,
  pickIdx: 0,
};

function tabToMappingKey(tabIdx) {
  return tabIdx === 0 ? 'global' : tabIdx - 1;
}

function openMapEditor() {
  mapEd.open = true;
  mapEd.tabIdx = 0;
  mapEd.rowIdx = -1;
  mapEd.picking = false;
  document.getElementById('mapping-modal').classList.add('open');
  renderMapEditor();
}

function closeMapEditor() {
  mapEd.open = false;
  mapEd.picking = false;
  document.getElementById('mapping-modal').classList.remove('open');
  saveMapping();
}

function enterPicker(ri) {
  mapEd.rowIdx = ri;
  mapEd.picking = true;
  const mKey   = tabToMappingKey(mapEd.tabIdx);
  const btnKey = BTN_ROWS[ri].key;
  let currentAct;
  if (mKey === 'global') {
    currentAct = mapping.global[btnKey] || 'NONE';
  } else {
    currentAct = (mapping[mKey]?.[btnKey] !== undefined)
      ? (mapping[mKey][btnKey] || 'NONE')
      : (mapping.global[btnKey] || 'NONE');
  }
  mapEd.pickIdx = ALL_ACTIONS.indexOf(currentAct);
  if (mapEd.pickIdx < 0) mapEd.pickIdx = ALL_ACTIONS.length - 1;
  renderMapEditor();
}

function confirmPick() {
  const mKey   = tabToMappingKey(mapEd.tabIdx);
  const btnKey = BTN_ROWS[mapEd.rowIdx].key;
  const chosen = ALL_ACTIONS[mapEd.pickIdx];
  if (mKey === 'global') {
    if (chosen === 'NONE') delete mapping.global[btnKey];
    else mapping.global[btnKey] = chosen;
  } else {
    if (chosen === 'NONE') delete mapping[mKey][btnKey];
    else mapping[mKey][btnKey] = chosen;
  }
  mapEd.picking = false;
  mapEd.rowIdx = -1;
  renderMapEditor();
}

function renderMapEditor() {
  // Update tab highlights
  document.querySelectorAll('.map-tab').forEach((el, i) =>
    el.classList.toggle('active', i === mapEd.tabIdx));

  const body   = document.getElementById('mapping-body');
  const footer = document.getElementById('mapping-footer');
  const mKey   = tabToMappingKey(mapEd.tabIdx);
  const mhk    = k => `<span class="map-hint-key">${k}</span>`;

  if (mapEd.picking) {
    // Action picker
    const btnKey = BTN_ROWS[mapEd.rowIdx].key;
    const mKeyVal = (mKey === 'global')
      ? (mapping.global[btnKey] || 'NONE')
      : (mapping[mKey]?.[btnKey] !== undefined ? mapping[mKey][btnKey] : mapping.global[btnKey] || 'NONE');

    let html = `<div id="pick-header">Assign action → ${BTN_ROWS[mapEd.rowIdx].label}</div><div id="action-picker">`;
    ALL_ACTIONS.forEach((act, i) => {
      const isCurrent = act === mKeyVal;
      html += `<div class="pick-row${i === mapEd.pickIdx ? ' focused' : ''}">
        ${act === 'NONE' ? '— unassigned —' : act}
        ${isCurrent ? '<span class="pick-current-mark">current</span>' : ''}
      </div>`;
    });
    html += `</div>`;
    body.innerHTML = html;
    requestAnimationFrame(() => {
      body.querySelectorAll('.pick-row')[mapEd.pickIdx]?.scrollIntoView({ block:'nearest' });
    });
    footer.innerHTML = `<span class="map-hint">${mhk('↑↓')} Navigate</span>
      <span class="map-hint">${mhk('A')} Confirm</span>
      <span class="map-hint">${mhk('B')} Cancel</span>`;
  } else {
    // Button list — "press to choose"
    let html = '';
    BTN_ROWS.forEach((btn, i) => {
      const isSelected = i === mapEd.rowIdx;
      const isCtrl     = btn.editorCtrl;

      let displayAct, isOverridden = false;
      if (mKey === 'global') {
        displayAct = mapping.global[btn.key] || 'NONE';
      } else {
        if (mapping[mKey]?.[btn.key] !== undefined) {
          displayAct = mapping[mKey][btn.key] || 'NONE';
          isOverridden = true;
        } else {
          displayAct = mapping.global[btn.key] || 'NONE';
        }
      }

      const isNone      = !displayAct || displayAct === 'NONE';
      const isInherited = mKey !== 'global' && !isOverridden;
      let actionClass   = 'map-action';
      if (isNone)      actionClass += ' none-action';
      else if (isInherited) actionClass += ' inherited';

      const badge = isOverridden ? `<span class="map-override-badge">override</span>` : '';
      const ctrlNote = isCtrl ? `<span class="map-override-badge" style="opacity:0.4">editor ctrl</span>` : '';
      const pressHint = isSelected && !isCtrl
        ? `<span style="margin-left:auto;font-size:10px;color:rgba(255,255,255,0.38);letter-spacing:0.06em">press again to assign →</span>` : '';

      html += `<div class="map-row${isSelected ? ' focused' : ''}${isCtrl ? ' ctrl-row' : ''}">
        <span class="map-btn-name">${btn.label}</span>
        <span class="map-arrow">→</span>
        <span class="${actionClass}">${isNone ? '—' : displayAct}</span>
        ${badge}${ctrlNote}${pressHint}
      </div>`;
    });
    body.innerHTML = html;
    if (mapEd.rowIdx >= 0) {
      requestAnimationFrame(() => {
        body.querySelectorAll('.map-row')[mapEd.rowIdx]?.scrollIntoView({ block:'nearest' });
      });
    }

    const selectedName = mapEd.rowIdx >= 0 ? BTN_ROWS[mapEd.rowIdx].label : null;
    footer.innerHTML = selectedName
      ? `<span class="map-hint">${mhk(selectedName)} selected — press again to assign</span>
         <span class="map-hint">${mhk('L/R')} Switch tab</span>
         <span class="map-hint">${mhk('B')} Deselect</span>`
      : `<span class="map-hint">Press any button to select it</span>
         <span class="map-hint">${mhk('L/R')} Switch tab</span>
         <span class="map-hint">${mhk('B')} Close</span>
         <span class="map-hint">${mhk('Start')} Reset tab</span>`;
  }
}

function setScreen(n) {
  currentScreen = Math.max(0, Math.min(2, n));
  document.getElementById('screen-track').style.transform =
    `translateX(-${currentScreen * 100}vw)`;
  document.querySelectorAll('#top-bar .tab').forEach((t,i) =>
    t.classList.toggle('active', i === currentScreen));
  updateHints();
}

function updateHints() {
  const row = document.getElementById('hints-row');
  if (!row) return;
  const pill = (key, label) =>
    `<div class="hint-pill"><span class="hint-key">${key}</span> ${label}</div>`;
  let hints = [];

  if (currentScreen === 1) {
    if (breath.countingDown) {
      hints = [pill('B', 'cancel')];
    } else if (breath.active) {
      hints = [pill('A', 'stop'), pill('B', 'stop')];
    } else {
      hints = [pill('← →', 'pattern'), pill('↑↓', 'row'), pill('A', 'start')];
    }
  } else if (currentScreen === 2) {
    if (tmr.running) {
      hints = [pill('A', 'rep'), pill('Start', 'pause'), pill('Z', 'reset')];
    } else if (tmr.rem < tmr.secs && tmr.rem > 0) {
      hints = [pill('Start', 'resume'), pill('Z', 'reset')];
    } else {
      hints = [pill('← →', 'pick time'), pill('Start', 'begin')];
    }
  } else {
    if (cmp.mode === 'grid')        hints = [pill('↑↓', 'row'), pill('← →', 'pillar'), pill('A', 'open')];
    else if (cmp.mode === 'state')  hints = [pill('← →', 'quality'), pill('↑↓', 'items'), pill('A', 'card'), pill('B', 'back')];
    else                            hints = [pill('↑↓', 'scroll'), pill('← →', 'sibling'), pill('B', 'back')];
  }

  hints.push(pill('L+R', 'refresh'), pill('ST+Z', 'map'));
  row.innerHTML = hints.join('');
}

function breathNavH(dir) {

  }

function breathNavV(dir) {

function breathStart() {
  const p = PATTERNS[breath.selIdx];
  breath.pattern = p;
  breath.targetCycles = BREATH_CYCLES[breath.cycleIdx].count;
  breath.lastPhase = null; breath.cycles = 0; breath.countingDown = true;

  document.getElementById('breath-selector').style.display = 'none';
  document.getElementById('breath-active').style.display = 'flex';
  document.getElementById('b-pname').textContent = p.name;
  ['br-outer','br-mid','br-main'].forEach(id =>
    document.getElementById(id).style.transform = 'scale(0.75)');
  updateHints();

  // 3-second countdown before first cycle
  let n = 3;
  const phaseEl = document.getElementById('b-phase');
  phaseEl.textContent = String(n); phaseEl.classList.add('countdown');
  document.getElementById('b-cycle').textContent = 'Get ready';
  playTone(330, 0.25);

  breath.cdIv = setInterval(() => {
    n--;
    if (n > 0) {
      phaseEl.textContent = String(n);
      playTone(330 + (3 - n) * 60, 0.25);
    } else {
      clearInterval(breath.cdIv); breath.cdIv = null;
      breath.countingDown = false; breath.active = true;
      phaseEl.classList.remove('countdown');
      breath.t0 = Date.now();
      playTone(520, 0.4);
      updateHints();
      breathLoop();
    }
  }, 1000);
}

function breathStop() {
  if (breath.cdIv) { clearInterval(breath.cdIv); breath.cdIv = null; }
  breath.active = false; breath.countingDown = false;
  cancelAnimationFrame(breath.raf);
  if (breath.audioCtx) { breath.audioCtx.close(); breath.audioCtx = null; }
  document.getElementById('breath-selector').style.display = 'flex';
  document.getElementById('breath-active').style.display = 'none';
  document.getElementById('b-phase').textContent = '—';
  document.getElementById('b-phase').classList.remove('countdown');
  renderBpSelector();
  updateHints();
}

function playTone(freq, dur) {
  try {
    if (!breath.audioCtx) breath.audioCtx = new AudioContext();
    const ctx = breath.audioCtx, osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0.11, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(g).connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(_) {}
}

function breathLoop() {
  if (!breath.active) return;
  const p = breath.pattern;
  const elapsed = Date.now() - breath.t0;
  const pos = elapsed % p.ms;
  const completedCycles = Math.floor(elapsed / p.ms);

  // Auto-stop when target reached
  if (breath.targetCycles !== Infinity && completedCycles >= breath.targetCycles) {
    breathStop(); return;
  }
  breath.cycles = completedCycles;

  let acc = 0, phase = null, prog = 0;
  for (const ph of p.phases) {
    if (pos < acc + ph.ms) { phase = ph; prog = (pos - acc) / ph.ms; break; }
    acc += ph.ms;
  }

  if (phase && phase.l !== breath.lastPhase) {
    breath.lastPhase = phase.l;
    if (phase.l === 'Inhale')      playTone(440, 0.28);
    else if (phase.l === 'Exhale') playTone(330, 0.28);
    else                           playTone(380, 0.18);
  }

  let scale = 0.6;
  if (phase) {
    if      (phase.l === 'Inhale') scale = 0.6 + 0.4 * prog;
    else if (phase.l === 'Exhale') scale = 1.0 - 0.4 * prog;
    else                           scale = prog < 0.02 ? 1.0 : 0.97;
  }

  document.getElementById('br-outer').style.transform = `scale(${scale * 0.93})`;
  document.getElementById('br-mid').style.transform   = `scale(${scale * 0.97})`;
  document.getElementById('br-main').style.transform  = `scale(${scale})`;
  document.getElementById('b-phase').textContent = phase ? phase.l : '—';

  const total = breath.targetCycles === Infinity ? '∞' : breath.targetCycles;
  document.getElementById('b-cycle').textContent = `Cycle ${breath.cycles + 1} of ${total}`;
  breath.raf = requestAnimationFrame(breathLoop);
}

function renderTime() {
  const m = String(Math.floor(tmr.rem/60)).padStart(2,'0');
  const s = String(tmr.rem%60).padStart(2,'0');
  document.getElementById('timer-time').textContent = `${m}:${s}`;
  if (tmr.running) {
    const elapsed = tmr.secs - tmr.rem;
    const strEnd = tmr.secs * 0.25;
    const bar = document.getElementById('struggle-bar');
    if (elapsed < strEnd) { bar.style.opacity='0.55'; bar.style.width=`${(elapsed/strEnd)*100}%`; }
    else bar.style.opacity = '0';
  }
}

function timerStart() {
  if (tmr.running) return;
  if (tmr.rem <= 0) { tmr.rem = tmr.secs; tmr.reps = 0; renderReps(); }
  tmr.running = true;
  document.getElementById('timer-state').textContent = 'In session';
  document.getElementById('timer-dur-row').style.display = 'none';
  document.getElementById('timer-ambient').style.animation = 'none';
  tmr.iv = setInterval(() => { if (tmr.rem > 0) { tmr.rem--; renderTime(); } else timerDone(); }, 1000);
  updateHints();
}

function timerPause() {
  if (!tmr.running) return;
  tmr.running = false; clearInterval(tmr.iv);
  document.getElementById('timer-state').textContent = 'Paused';
  updateHints();
}

function timerToggle() { tmr.running ? timerPause() : timerStart(); }

function timerReset() {
  timerPause(); tmr.rem = tmr.secs; tmr.reps = 0;
  document.getElementById('timer-state').textContent = 'Ready';
  document.getElementById('timer-dur-row').style.display = 'flex';
  document.getElementById('timer-time').style.color = '';
  document.getElementById('timer-ambient').style.animation = '';
  document.getElementById('struggle-bar').style.opacity = '0';
  renderTime(); renderReps();
  updateHints();
}

function timerDone() {
  timerPause();
  document.getElementById('timer-state').textContent = 'Complete';
  document.getElementById('timer-time').style.color = COLORS.space;
  setTimeout(timerReset, 4000);
}

function logRep() {
  if (!tmr.running) return;
  tmr.reps++;
  const el = document.getElementById('rep-num');
  el.textContent = tmr.reps;
  el.classList.add('pop');
  setTimeout(() => el.classList.remove('pop'), 100);
}

function renderReps() { document.getElementById('rep-num').textContent = tmr.reps; }
function timerDurNav(dir) { if (!tmr.running) setDur((tmr.durIdx+dir+DURATIONS.length)%DURATIONS.length); }

// ══════════════════════════════════════════════════════════
// COMPENDIUM — DATA LOAD
// ══════════════════════════════════════════════════════════

async function loadCompendium() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/mechanics?select=id,title,pillar,flow_key,definition,card_type,parent_mechanic_id,content_md,enrichment_score&order=pillar.asc,flow_key.asc`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error(res.statusText);
    cmp.raw = await res.json();

    // DEBUG: check content_md is actually in the response
    const withContent = cmp.raw.filter(r => r.content_md);
    const sample = withContent[0];
    console.log(`[CMP] Fetched ${cmp.raw.length} rows, ${withContent.length} with content_md`);
    if (sample) console.log(`[CMP] Sample (${sample.id}): content_md starts with: ${sample.content_md.slice(0, 80).replace(/\n/g,'↵')}`);
    else console.warn('[CMP] NO rows have content_md — check Supabase column or RLS');

    // Build groups: pillar → [ { key, label, qualities[], techniques[], concepts[] } ]
    for (const p of PILLARS) {
      cmp.groups[p] = KEY_ORDER[p].map(key => {
        const all = cmp.raw.filter(r => r.pillar === p && r.flow_key === key);
        return {
          key, label: fmtKey(key),
          qualities:  all.filter(r => r.card_type === 'quality' || r.card_type === 'mechanic'),
          techniques: all.filter(r => r.card_type === 'technique'),
          concepts:   all.filter(r => r.card_type === 'concept'),
        };
      });
    }

    cmp.loaded = true;
    document.getElementById('c-loading').remove();
    renderCmpGrid();
  } catch(e) {
    document.getElementById('c-loading').textContent = 'Could not load — check connection';
    console.error(e);
  }
}

function fmtKey(k) {
  return k.split('-').map(w => w[0].toUpperCase() + w.slice(1)).join(' ');
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ══════════════════════════════════════════════════════════
// COMPENDIUM — GRID VIEW
// ══════════════════════════════════════════════════════════

function renderCmpGrid() {
  const grid = document.getElementById('cmp-grid');
  grid.innerHTML = '';

  PILLARS.forEach((p, pi) => {
    const isColFocused = pi === cmp.col;
    const col = document.createElement('div');
    col.className = 'g-col' + (isColFocused ? ' focused' : '');
    col.style.color = COLORS[p];
    col.style.background = isColFocused
      ? hexToRgba(COLORS[p], 0.09)
      : 'rgba(255,255,255,0.025)';

    const hdr = document.createElement('div');
    hdr.className = 'g-col-header';
    hdr.innerHTML = `
      <img class="g-col-header-logo" src="${PILLAR_LOGOS[p]}" alt="${p}" />
      ${p.toUpperCase()}`;
    col.appendChild(hdr);

    (cmp.groups[p] || []).forEach((g, gi) => {
      const focused = isColFocused && gi === cmp.row;
      const row = document.createElement('div');
      row.className = 'g-state-row' + (focused ? ' focused' : '');
      row.style.color = COLORS[p];
      row.style.background = focused
        ? hexToRgba(COLORS[p], 0.68)
        : hexToRgba(COLORS[p], 0.18);

      const logoSrc = KEY_LOGOS[g.key] || '';

      // Sort qualities: restore → maintain → concentrate
      const sortedQualities = g.qualities.slice().sort((a, b) => {
        const tA = QUALITY_TYPE_ORDER[QUALITY_TYPE_MAP[a.title.toLowerCase()] || 'restore'] ?? 0;
        const tB = QUALITY_TYPE_ORDER[QUALITY_TYPE_MAP[b.title.toLowerCase()] || 'restore'] ?? 0;
        return tA - tB;
      });

      const qualityCols = sortedQualities.map(q => {
        const qType = QUALITY_TYPE_MAP[q.title.toLowerCase()] || 'restore';
        const icon  = QUALITY_TYPE_ICON[qType] || '';
        const label = QUALITY_TYPE_LABEL[qType] || qType;
        return `<div class="g-sq-col">
          <span class="g-sq-name">${escHtml(q.title)}</span>
          <div class="g-sq-type-row">
            <span class="g-sq-type-icon">${icon}</span>
            <span class="g-sq-type">${label}</span>
          </div>
        </div>`;
      }).join('');

      row.innerHTML = `
        <div class="g-state-name">${g.label}</div>
        <div class="g-state-icon-wrap">
          ${logoSrc ? `<img class="g-state-icon" src="${logoSrc}" alt="${g.label}" />` : ''}
        </div>
        <div class="g-state-qual-bottom">${qualityCols}</div>`;
      col.appendChild(row);
    });

    grid.appendChild(col);
  });
}

function gridNavCol(dir) {
  cmp.col = Math.max(0, Math.min(3, cmp.col + dir));
  cmp.row = 0;
  renderCmpGrid();
}

function gridNavRow(dir) {
  const len = (cmp.groups[PILLARS[cmp.col]] || []).length;
  cmp.row = Math.max(0, Math.min(len - 1, cmp.row + dir));
  renderCmpGrid();
}

function gridEnter() {
  const p = PILLARS[cmp.col];
  const g = (cmp.groups[p] || [])[cmp.row];
  if (!g) return;

  const qualityItems = g.qualities
    .map(r => ({ ...r, _type: 'quality' }))
    .sort((a, b) => {
      const tA = QUALITY_TYPE_ORDER[QUALITY_TYPE_MAP[a.title.toLowerCase()] || 'restore'] ?? 0;
      const tB = QUALITY_TYPE_ORDER[QUALITY_TYPE_MAP[b.title.toLowerCase()] || 'restore'] ?? 0;
      return tA - tB;
    });
  const techItems    = g.techniques.map(r => ({ ...r, _type: 'technique' }));
  const conceptItems = g.concepts.map(r => ({ ...r, _type: 'concept' }));

  // Build parent→children lookup for filtering
  const childrenByParent = {};
  [...techItems, ...conceptItems].forEach(child => {
    const pid = child.parent_mechanic_id;
    if (pid) {
      if (!childrenByParent[pid]) childrenByParent[pid] = [];
      childrenByParent[pid].push(child);
    }
  });

  cmp.qualityItems     = qualityItems;
  cmp.childrenByParent = childrenByParent;
  cmp.selectedQuality  = 0;
  cmp.stateItemIdx     = 0;

  updateFilteredItems();

  // Header
  document.getElementById('sv-pillar-lbl').textContent = p.toUpperCase();
  document.getElementById('sv-pillar-lbl').style.color = COLORS[p];
  const titleEl = document.getElementById('sv-state-title');
  titleEl.style.color = COLORS[p];
  const logoSrc = KEY_LOGOS[g.key] || '';
  titleEl.innerHTML = logoSrc
    ? `<img class="sv-title-icon" src="${logoSrc}" alt="" />${escHtml(g.label)}`
    : escHtml(g.label);

  renderQualityBar();
  renderItemList();
  renderActivityWindow();
  switchCmpMode('state');
}

// ══════════════════════════════════════════════════════════
// COMPENDIUM — STATE VIEW
// ══════════════════════════════════════════════════════════

function updateFilteredItems() {
  const q = cmp.qualityItems[cmp.selectedQuality];
  if (!q) { cmp.filteredItems = []; return; }
  cmp.filteredItems = (cmp.childrenByParent[q.id] || [])
    .slice()
    .sort((a, b) =>
      ({ technique: 0, concept: 1 }[a._type] || 0) -
      ({ technique: 0, concept: 1 }[b._type] || 0)
    );
  cmp.stateItemIdx = 0;
}

function renderQualityBar() {
  const bar   = document.getElementById('sv-quality-bar');
  bar.innerHTML = '';
  const color = COLORS[PILLARS[cmp.col]];

  cmp.qualityItems.forEach((q, i) => {
    const isSelected = i === cmp.selectedQuality;
    const qType = QUALITY_TYPE_MAP[q.title.toLowerCase()] || 'restore';

    const card = document.createElement('div');
    card.className = 'sv-q-card' + (isSelected ? ' sv-q-selected' : ' sv-q-inactive');
    card.style.color = color;
    if (isSelected) {
      card.style.background   = hexToRgba(color, 0.10);
      card.style.borderColor  = hexToRgba(color, 0.30);
      card.style.boxShadow    = `0 0 36px ${hexToRgba(color, 0.14)}, 0 10px 28px rgba(0,0,0,0.50)`;
    }
    card.innerHTML = `
      <div class="sv-q-type-row">
        ${QUALITY_TYPE_ICON[qType] || ''}
        <span class="sv-q-type-label">${QUALITY_TYPE_LABEL[qType] || qType}</span>
      </div>
      <div class="sv-q-name">${escHtml(q.title)}</div>
      <div class="sv-q-def">${escHtml(q.definition || '')}</div>`;
    bar.appendChild(card);
  });
}

function renderItemList() {
  const panel = document.getElementById('sv-item-list');
  panel.innerHTML = '';
  const color = COLORS[PILLARS[cmp.col]];
  const q = cmp.qualityItems[cmp.selectedQuality];
  if (!q) return;

  const techCount = cmp.filteredItems.filter(i => i._type === 'technique').length;
  const conCount  = cmp.filteredItems.filter(i => i._type === 'concept').length;

  const header = document.createElement('div');
  header.className = 'sv-il-header';
  header.style.color = color;
  header.innerHTML = `
    <span class="sv-il-quality-name">${escHtml(q.title)}</span>
    <span class="sv-il-count">${techCount} technique${techCount !== 1 ? 's' : ''} · ${conCount} concept${conCount !== 1 ? 's' : ''}</span>`;
  panel.appendChild(header);

  const items = document.createElement('div');
  items.className = 'sv-il-items';

  if (!cmp.filteredItems.length) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:20px 14px;font-size:13px;color:var(--muted)';
    empty.textContent = 'No techniques or concepts linked yet.';
    items.appendChild(empty);
  } else {
    let lastType = null;
    cmp.filteredItems.forEach((item, i) => {
      if (item._type !== lastType) {
        const lbl = document.createElement('div');
        lbl.className = 'sv-il-section-label';
        lbl.textContent = item._type === 'technique' ? 'Techniques' : 'Concepts';
        items.appendChild(lbl);
        lastType = item._type;
      }
      const el = document.createElement('div');
      el.className = 'sv-il-item' + (i === cmp.stateItemIdx ? ' focused' : '');
      el.style.color = color;
      el.innerHTML = `
        <div class="sv-il-item-icon" style="background:${hexToRgba(color,0.10)};border:1px solid ${hexToRgba(color,0.25)}">${TYPE_ICON[item._type] || '·'}</div>
        <div>
          <div class="sv-il-item-title">${escHtml(item.title)}</div>
          ${item.definition ? `<div class="sv-il-item-def">${escHtml(trunc(item.definition, 70))}</div>` : ''}
        </div>`;
      items.appendChild(el);
    });
  }

  panel.appendChild(items);

  // Scroll focused item into view
  setTimeout(() => {
    const focused = panel.querySelector('.sv-il-item.focused');
    if (focused) focused.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }, 30);
}

function renderActivityWindow() {
  const item  = cmp.filteredItems[cmp.stateItemIdx];
  const p     = PILLARS[cmp.col];
  const color = COLORS[p];

  const badge = document.getElementById('sv-aw-badge');
  const bc    = document.getElementById('sv-aw-breadcrumb');
  const title = document.getElementById('sv-aw-title');
  const inner = document.getElementById('sv-aw-inner');
  if (!badge || !inner) return;

  if (!item) {
    badge.textContent = '';
    bc.textContent    = '';
    title.textContent = '';
    inner.innerHTML   = '';
    return;
  }

  badge.textContent      = (TYPE_LABEL[item._type] || item._type).toUpperCase();
  badge.style.color      = color;
  badge.style.background = hexToRgba(color, 0.10);
  badge.style.border     = `1px solid ${hexToRgba(color, 0.28)}`;

  const q = cmp.qualityItems[cmp.selectedQuality];
  bc.textContent = q
    ? `${q.title} · ${fmtKey(item.flow_key)} · ${p.charAt(0).toUpperCase() + p.slice(1)}`
    : fmtKey(item.flow_key);

  title.textContent = item.title;
  title.style.color = color;

  inner.innerHTML = renderCardContent(item, color);

  cmp.prevScrollY = 0;
  inner.style.transform = 'translateY(0)';

  setTimeout(() => {
    const area = document.getElementById('sv-aw-scroll');
    if (!area) return;
    cmp.prevScrollMax = Math.max(0, inner.scrollHeight - area.clientHeight + 60);
  }, 30);
}

function stateNavRow(dir) {
  const next = cmp.stateItemIdx + dir;
  if (next < 0 || next >= cmp.filteredItems.length) return;
  cmp.stateItemIdx = next;
  renderItemList();
  renderActivityWindow();
}

function stateNavQuality(dir) {
  const next = cmp.selectedQuality + dir;
  if (next < 0 || next >= cmp.qualityItems.length) return;
  cmp.selectedQuality = next;
  updateFilteredItems();
  renderQualityBar();
  renderItemList();
  renderActivityWindow();
}

function prevScroll(dir) {
  // Activity window scroll (UP/DOWN when at list edge — kept for card view compat)
  const STEP = 100;
  cmp.prevScrollY = Math.max(0, Math.min(cmp.prevScrollMax, cmp.prevScrollY + dir * STEP));
  const inner = document.getElementById('sv-aw-inner');
  if (inner) inner.style.transform = `translateY(-${cmp.prevScrollY}px)`;
}

function stateEnter() {
  if (!cmp.filteredItems.length) return;
  cmp.cardItems = cmp.filteredItems;
  cmp.cardIdx   = cmp.stateItemIdx;
  enterCard();
}

// COMPENDIUM — CARD VIEW
// ══════════════════════════════════════════════════════════

function enterCard() {
  const item = cmp.cardItems[cmp.cardIdx];
  if (!item) return;
  const p = PILLARS[cmp.col];
  const color = COLORS[p];

  document.getElementById('cv-stripe').style.background = color;

  // Breadcrumb
  const bc = document.getElementById('cv-breadcrumb');
  bc.style.color = color;
  bc.innerHTML = `${p.toUpperCase()} <span>›</span> ${fmtKey(item.flow_key)} <span>›</span> ${TYPE_LABEL[item._type] || item._type}`;

  document.getElementById('cv-type').textContent = TYPE_ICON[item._type] + ' ' + (TYPE_LABEL[item._type] || item._type).toUpperCase();
  document.getElementById('cv-type').style.color = color;

  // Parent quality badge for techniques and concepts
  const parentBadge = document.getElementById('cv-parent-badge');
  const isChild = item._type === 'technique' || item._type === 'concept';
  if (isChild && item.parent_mechanic_id) {
    const parent = cmp.raw.find(r => r.id === item.parent_mechanic_id);
    if (parent) {
      parentBadge.style.display = 'flex';
      parentBadge.innerHTML = `<span class="cv-parent-badge-dot" style="background:${color}"></span>${escHtml(parent.title)}`;
    } else {
      parentBadge.style.display = 'none';
    }
  } else {
    parentBadge.style.display = 'none';
  }

  document.getElementById('cv-title').textContent = item.title;

  // Counter
  document.getElementById('cv-counter').textContent = `${cmp.cardIdx + 1} / ${cmp.cardItems.length}`;

  // Render content
  const inner = document.getElementById('cv-scroll-inner');
  inner.style.setProperty('--accent', color);
  console.log(`[CARD] "${item.title}" | type:${item._type} | content_md:${item.content_md ? item.content_md.length + ' chars' : 'NULL'}`);
  const renderedHtml = renderCardContent(item, color);
  console.log(`[CARD] renderCardContent → ${renderedHtml.length} chars HTML`);
  if (!renderedHtml) console.warn('[CARD] Empty render — extractSection probably found no matching headings');
  inner.innerHTML = renderedHtml;

  // Reset scroll
  cmp.cardScrollY = 0;
  inner.style.transform = 'translateY(0)';

  // Calculate max scroll
  setTimeout(() => {
    const area = document.getElementById('cv-scroll-area');
    const fullH = inner.scrollHeight;
    const visH  = area.clientHeight;
    cmp.cardScrollMax = Math.max(0, fullH - visH + 60);
    const fade = document.getElementById('cv-fade');
    fade.style.display = cmp.cardScrollMax > 0 ? 'block' : 'none';
  }, 50);

  switchCmpMode('card');
}

function cardScroll(dir) {
  const STEP = 90;
  cmp.cardScrollY = Math.max(0, Math.min(cmp.cardScrollMax, cmp.cardScrollY + dir * STEP));
  document.getElementById('cv-scroll-inner').style.transform = `translateY(-${cmp.cardScrollY}px)`;
  const fade = document.getElementById('cv-fade');
  fade.style.opacity = cmp.cardScrollY >= cmp.cardScrollMax ? '0' : '1';
}

function cardNavSibling(dir) {
  const next = cmp.cardIdx + dir;
  if (next < 0 || next >= cmp.cardItems.length) return;
  cmp.cardIdx = next;
  enterCard();
}

// ══════════════════════════════════════════════════════════
// COMPENDIUM — CONTENT RENDERER
// ══════════════════════════════════════════════════════════

function renderCardContent(item, color) {
  if (!item.content_md) {
    return `<p class="cv-para" style="color:var(--muted)">No content yet.</p>`;
  }
  // Strip wikilinks [[slug]] → slug so they never appear as raw [[text]] in the UI
  const md = item.content_md.replace(/\[\[([^\]]+)\]\]/g, '$1');
  const t = item._type;
  let html = '';

  // First blockquote — always show
  const quote = extractFirstQuote(md);
  if (quote) {
    html += `<div class="cv-quote" style="border-left-color:${color}">${escHtml(quote)}</div>`;
  }

  if (t === 'technique') {
    html += renderTechniqueContent(md, color);
  } else if (t === 'concept') {
    html += renderConceptContent(md, color);
  } else {
    // Quality / mechanic
    html += renderQualityContent(md, color);
  }

  // Fallback: if all section renders produced nothing, show raw definition + first 400 chars of body
  if (!html) {
    console.warn(`[CARD] All section renders empty for "${item?.title}" (${t}) — falling back to raw preview`);
    const bodyStart = md.replace(/^---[\s\S]*?---\n/,'').slice(0, 400);
    html = `<div class="cv-para" style="color:var(--muted);font-size:12px">${escHtml(bodyStart.trim())}…</div>`;
  }

  return html;
}

function renderTechniqueContent(md, color) {
  let html = '';

  // ## Mechanism (why it works)
  const mechanism = extractSection(md, ['Mechanism', 'Why It Enables Flow', 'Why it Enables Flow', 'How It Works']);
  if (mechanism) {
    const para = mechanism.split(/\n{2,}/).filter(p => p.trim())[0];
    if (para) {
      html += `<div class="cv-section-head" style="color:${color}">Mechanism</div>`;
      html += `<div class="cv-para">${escHtml(para.trim())}</div>`;
    }
  }

  // ## Protocol / Steps
  const protocol = extractSection(md, ['Protocol', 'Steps', 'The Protocol']);
  if (protocol) {
    html += `<div class="cv-section-head" style="color:${color}">Protocol</div>`;
    html += parseProtocolSteps(protocol, color);
  }

  // ## When to Use
  const when = extractSection(md, ['When to Use']);
  if (when) {
    html += `<div class="cv-section-head" style="color:${color}">When to use</div>`;
    html += parseBullets(when, color);
  }

  // ## Key Insight
  const ki = extractSection(md, ['Key Insight']);
  if (ki) {
    const kiText = ki.replace(/^>+\s*/gm, '').split('\n').filter(l=>l.trim()).join(' ');
    if (kiText) {
      html += `<div class="cv-section-head" style="color:${color}">Key Insight</div>`;
      html += `<div class="cv-quote" style="border-left-color:${color}">${escHtml(kiText)}</div>`;
    }
  }

  return html;
}

function renderConceptContent(md, color) {
  let html = '';

  // ## What It Is — first 2 paragraphs
  const what = extractSection(md, ['What It Is', 'What it is', 'Summary']);
  if (what) {
    html += `<div class="cv-section-head" style="color:${color}">What it is</div>`;
    const paras = what.split(/\n{2,}/).filter(p => p.trim() && !p.trim().startsWith('- ') && !p.trim().startsWith('*'));
    paras.slice(0, 2).forEach(p => {
      html += `<div class="cv-para">${escHtml(p.trim())}</div>`;
    });
  }

  // ## Why It Matters for Flow
  const why = extractSection(md, ['Why It Matters for Flow', 'Why It Matters', 'Link to FourFlow', 'FourFlow Link', 'The Mechanism']);
  if (why) {
    html += `<div class="cv-section-head" style="color:${color}">Why it matters</div>`;
    const paras = why.split(/\n{2,}/).filter(p => p.trim() && !p.trim().startsWith('- '));
    paras.slice(0, 1).forEach(p => {
      html += `<div class="cv-para">${escHtml(p.trim())}</div>`;
    });
  }

  // ## Application — bullets or paragraphs
  const app = extractSection(md, ['Application', 'Applications', 'How to use']);
  if (app) {
    html += `<div class="cv-section-head" style="color:${color}">Application</div>`;
    html += parseBullets(app, color);
  }

  return html;
}

function renderQualityContent(md, color) {
  let html = '';

  // ## Why It Enables Flow — first paragraph
  const why = extractSection(md, ['Why It Enables Flow', 'Why it Enables Flow']);
  if (why) {
    html += `<div class="cv-section-head" style="color:${color}">Why it enables flow</div>`;
    const para = why.split(/\n{2,}/).filter(p=>p.trim())[0];
    if (para) html += `<div class="cv-para">${escHtml(para.trim())}</div>`;
  }

  // ## Recall block
  const recall = extractSection(md, ['Recall']);
  if (recall) {
    html += `<div class="cv-section-head" style="color:${color}">Quick recall</div>`;
    const lines = recall.split('\n').filter(l => l.trim());
    lines.forEach(line => {
      const m = line.match(/^\*\*(.+?)\*\*[:\s]+(.+)/);
      if (m) {
        html += `<div class="cv-recall-block">
          <div class="cv-recall-label" style="color:${color}">${escHtml(m[1])}</div>
          <div class="cv-recall-text">${escHtml(m[2])}</div>
        </div>`;
      }
    });
  }

  // ## Techniques list
  const techs = extractSection(md, ['Techniques']);
  if (techs) {
    html += `<div class="cv-section-head" style="color:${color}">Techniques</div>`;
    const items = techs.split('\n').filter(l => l.trim().startsWith('-'));
    items.slice(0,4).forEach(item => {
      const text = item.replace(/^-\s*/, '').replace(/\[\[|\]\]/g, '').replace(/—.+/, '');
      html += `<div class="cv-bullet" style="color:${color}"><div class="cv-bullet-text">${escHtml(text.trim())}</div></div>`;
    });
  }

  return html;
}

// ── Parse numbered protocol steps ─────────────────────────

function parseProtocolSteps(text, color) {
  let html = '';
  const lines = text.split('\n');
  let stepNum = 0;
  let stepText = '';
  let subLines = [];
  let inItalic = false;

  function flushStep() {
    if (!stepText) return;
    let sub = subLines.join(' ').replace(/^\*(.+)\*$/, '$1').trim();
    html += `<div class="cv-step">
      <div class="cv-step-num" style="background:${color}">${stepNum}</div>
      <div>
        <div class="cv-step-text">${escHtml(stepText)}</div>
        ${sub ? `<div class="cv-step-sub">${escHtml(sub)}</div>` : ''}
      </div>
    </div>`;
    stepText = ''; subLines = [];
  }

  for (const line of lines) {
    const numbered = line.match(/^(\d+)\.\s+(.+)/);
    const italicLine = line.match(/^\*(.+)\*$/);
    const boldStep = line.match(/^\*\*Step\s+\d+[^*]*\*\*(.*)$/i);

    if (boldStep) {
      flushStep();
      stepNum++;
      stepText = line.replace(/\*\*/g,'').replace(/^Step\s+\d+\s*[—-]?\s*/i,'').trim();
    } else if (numbered) {
      flushStep();
      stepNum = parseInt(numbered[1]);
      stepText = numbered[2];
    } else if (line.trim().startsWith('- ') && stepText) {
      subLines.push(line.replace(/^-\s*/,'').trim());
    } else if (italicLine && stepText) {
      subLines.push(italicLine[1].trim());
    }
  }
  flushStep();

  return html || `<div class="cv-para">${escHtml(text.trim().slice(0,300))}</div>`;
}

// ── Parse bullet list ──────────────────────────────────────

function parseBullets(text, color) {
  let html = '';
  const lines = text.split('\n').filter(l => l.trim().startsWith('-') || l.trim().match(/^\*\*/));
  lines.slice(0, 6).forEach(line => {
    let t = line.replace(/^[-*]+\s*/, '').replace(/\*\*/g,'').trim();
    if (!t) return;
    // Bold intro — split at colon or dash
    const intro = t.match(/^([^:—]+)[:\—]\s*(.+)/);
    if (intro) {
      html += `<div class="cv-bullet" style="color:${color}">
        <div class="cv-bullet-text"><strong>${escHtml(intro[1])}</strong>: ${escHtml(intro[2])}</div>
      </div>`;
    } else {
      html += `<div class="cv-bullet" style="color:${color}">
        <div class="cv-bullet-text">${escHtml(t)}</div>
      </div>`;
    }
  });
  return html;
}

// ── Markdown helpers ───────────────────────────────────────

function extractFirstQuote(md) {
  if (!md) return '';
  const lines = md.split('\n');
  const parts = [];
  let inQ = false;
  for (const l of lines) {
    if (l.startsWith('> ')) { parts.push(l.slice(2).trim()); inQ = true; }
    else if (inQ) break;
  }
  return parts.join(' ');
}

function extractSection(md, headings) {
  if (!md) return '';
  const lines = md.split('\n');
  let inSection = false;
  let content = [];

  for (const line of lines) {
    const isH = line.match(/^#+\s+(.+)/);
    if (isH) {
      if (inSection) break;
      const title = isH[1].trim();
      if (headings.some(h => title.toLowerCase().includes(h.toLowerCase()))) {
        inSection = true;
        continue;
      }
    }
    if (inSection) content.push(line);
  }
  return content.join('\n').trim();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function trunc(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || ''); }

// ══════════════════════════════════════════════════════════
// COMPENDIUM — MODE TRANSITIONS
// ══════════════════════════════════════════════════════════

function switchCmpMode(newMode) {
  console.log(`[CMP] switchCmpMode: ${cmp.mode} → ${newMode}`);
  const views = { grid:'cmp-grid-view', state:'cmp-state-view', card:'cmp-card-view' };
  const prevMode = cmp.mode;

  // Exit current
  const prevEl = document.getElementById(views[prevMode]);
  prevEl.classList.remove('active');
  prevEl.classList.add(newMode === 'card' || (newMode === 'state' && prevMode === 'grid') ? 'exit-left' : 'exit-right');

  // Enter new
  const nextEl = document.getElementById(views[newMode]);
  nextEl.classList.remove('exit-left', 'exit-right');
  nextEl.classList.add('active');

  // Cleanup exit class after transition
  setTimeout(() => prevEl.classList.remove('exit-left','exit-right'), 320);

  cmp.mode = newMode;
  updateHints();
}

// ══════════════════════════════════════════════════════════
// UNIFIED ACTION HANDLER
// ══════════════════════════════════════════════════════════

function action(name) {
  setDebugLast(name);

  switch (name) {
    case 'REFRESH':      window.location.reload(); break;
    case 'OPEN_MAPPING': openMapEditor(); break;
    case 'PREV_SCREEN': setScreen(currentScreen - 1); break;
    case 'NEXT_SCREEN': setScreen(currentScreen + 1); break;

    case 'UP':
      if (currentScreen === 1 && !breath.active && !breath.countingDown) breathNavV(-1);
      else if (cmp.mode === 'grid')  gridNavRow(-1);
      else if (cmp.mode === 'state') stateNavRow(-1);
      else if (cmp.mode === 'card')  cardScroll(-1);
      break;

    case 'DOWN':
      if (currentScreen === 1 && !breath.active && !breath.countingDown) breathNavV(1);
      else if (cmp.mode === 'grid')  gridNavRow(1);
      else if (cmp.mode === 'state') stateNavRow(1);
      else if (cmp.mode === 'card')  cardScroll(1);
      break;

    case 'LEFT':
      if (currentScreen === 1 && !breath.active && !breath.countingDown) breathNavH(-1);
      else if (currentScreen === 2) timerDurNav(-1);
      else if (currentScreen === 0) {
        if      (cmp.mode === 'grid')  gridNavCol(-1);
        else if (cmp.mode === 'state') stateNavQuality(-1);
        else if (cmp.mode === 'card')  cardNavSibling(-1);
      }
      break;

    case 'RIGHT':
      if (currentScreen === 1 && !breath.active && !breath.countingDown) breathNavH(1);
      else if (currentScreen === 2) timerDurNav(1);
      else if (currentScreen === 0) {
        if      (cmp.mode === 'grid')  gridNavCol(1);
        else if (cmp.mode === 'state') stateNavQuality(1);
        else if (cmp.mode === 'card')  cardNavSibling(1);
      }
      break;

    case 'A':
      if (currentScreen === 1) {
        if (breath.active) breathStop();
        else if (!breath.countingDown) breathStart();
      }
      else if (currentScreen === 2) logRep();
      else if (cmp.mode === 'grid')  gridEnter();
      else if (cmp.mode === 'state') stateEnter();
      break;

    case 'B':
      if (currentScreen === 1 && (breath.active || breath.countingDown)) breathStop();
      else if (currentScreen === 0) {
        if      (cmp.mode === 'state') switchCmpMode('grid');
        else if (cmp.mode === 'card')  switchCmpMode('state');
      }
      break;

    case 'START':
      if (currentScreen === 2) timerToggle();
      break;

    case 'Z':
      if (currentScreen === 2) timerReset();
      break;
  }
}

// ══════════════════════════════════════════════════════════
// GAMEPAD — exact mapping (verified)
// ══════════════════════════════════════════════════════════

const DEBOUNCE = 180;
const lastFire = {};
function canFire(k) {
  const now = Date.now();
  if (!lastFire[k] || now - lastFire[k] > DEBOUNCE) { lastFire[k] = now; return true; }
  return false;
}
function tryFire(k, a) { if (canFire(k)) action(a); }

const prevBtns = {};
function edge(idx, pressed) {
  const was = !!prevBtns[idx]; prevBtns[idx] = pressed;
  return pressed && !was;
}

let gpConnected = false;
let debugVisible = false;
let prevHatDir = null; // tracks last axis-9 D-pad direction for edge detection

// Axis 9 = POV hat on Windows DirectInput controllers.
// Neutral reports ~3.29 (out of range). Cardinal values from this controller:
//   Up: -1.00  Right: -0.43  Down: -0.14  Left: 0.71
// Thresholds are midpoints between adjacent values.
function getHatDir(axes) {
  const v = axes?.[9];
  if (v === undefined || v > 2.0) return null; // neutral / not present
  if (v < -0.715) return 'DU';                 // up
  if (v < -0.285) return 'DR';                 // right
  if (v <  0.285) return 'DD';                 // down
  return 'DL';                                  // left
}

function pollGamepad() {
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  let pad = null;
  for (const p of pads) { if (p) { pad = p; break; } }

  const connected = !!pad;
  if (connected !== gpConnected) {
    gpConnected = connected;
    const el = document.getElementById('gp-status');
    el.textContent = connected ? 'CONTROLLER CONNECTED' : 'NO CONTROLLER';
    el.classList.toggle('on', connected);
  }

  if (pad) {
    const b = pad.buttons;
    if (debugVisible) updateDebug(pad);

    // ── Hat axis edge detection (axis 9, Windows DirectInput D-pad) ──
    const hatDir = getHatDir(pad.axes);
    const hatChanged = hatDir !== prevHatDir;
    prevHatDir = hatDir;

    if (mapEd.open) {
      // ── Editor: raw button/axis capture — bypass action system entirely ──
      if (mapEd.picking) {
        // Action picker: navigate with any up/down input (buttons or hat axis)
        if (edge('e_pu', b[12]?.pressed || b[0]?.pressed) || (hatChanged && hatDir === 'DU')) {
          mapEd.pickIdx = (mapEd.pickIdx - 1 + ALL_ACTIONS.length) % ALL_ACTIONS.length;
          renderMapEditor();
        }
        if (edge('e_pd', b[13]?.pressed || b[2]?.pressed) || (hatChanged && hatDir === 'DD')) {
          mapEd.pickIdx = (mapEd.pickIdx + 1) % ALL_ACTIONS.length;
          renderMapEditor();
        }
        if (edge('e_pa', b[6]?.pressed))  confirmPick();
        if (edge('e_pb', b[8]?.pressed))  { mapEd.picking = false; renderMapEditor(); }
      } else {
        // Select mode: press any button/direction to select its row; press again to enter picker
        // L(4) = prev tab, R(5) = next tab, B(8) = deselect or close

        if (edge('e_l', b[4]?.pressed)) {
          mapEd.tabIdx = (mapEd.tabIdx - 1 + 4) % 4;
          mapEd.rowIdx = -1;
          renderMapEditor();
        }
        if (edge('e_r', b[5]?.pressed)) {
          mapEd.tabIdx = (mapEd.tabIdx + 1) % 4;
          mapEd.rowIdx = -1;
          renderMapEditor();
        }
        if (edge('e_b', b[8]?.pressed)) {
          if (mapEd.rowIdx >= 0) { mapEd.rowIdx = -1; renderMapEditor(); }
          else { closeMapEditor(); }
        }

        // Hat axis D-pad in select mode — select row or enter picker
        if (hatChanged && hatDir) {
          const ri = BTN_ROWS.findIndex(r => r.key === hatDir);
          if (ri >= 0) {
            if (mapEd.rowIdx === ri) enterPicker(ri);
            else { mapEd.rowIdx = ri; renderMapEditor(); }
          }
        }

        // All other buttons: select row or enter picker if already selected.
        // Special case: Start when nothing is selected → reset current tab to defaults.
        for (const [idx, key] of [[12,'DU'],[13,'DD'],[14,'DL'],[15,'DR'],
                                    [0,'CU'],[1,'CR'],[2,'CD'],[3,'CL'],
                                    [6,'A'],[9,'ST'],[7,'Z']]) {
          if (edge(`e_${key}`, b[idx]?.pressed)) {
            if (key === 'ST' && mapEd.rowIdx === -1) {
              const mk = tabToMappingKey(mapEd.tabIdx);
              if (mk === 'global') mapping.global = { ...DEFAULT_MAPPING.global };
              else mapping[mk] = {};
              renderMapEditor();
            } else {
              const ri = BTN_ROWS.findIndex(r => r.key === key);
              if (mapEd.rowIdx === ri) {
                enterPicker(ri);
              } else {
                mapEd.rowIdx = ri;
                renderMapEditor();
              }
            }
            break;
          }
        }
      }
    } else {
      // ── Normal gameplay input ──
      const lPressed  = !!b[4]?.pressed;
      const rPressed  = !!b[5]?.pressed;
      const stPressed = !!b[9]?.pressed;
      const zPressed  = !!b[7]?.pressed;

      // Chord combos (suppress individual actions while held)
      if (lPressed && rPressed) {
        if (edge('LR_COMBO', true)) action('REFRESH');
      } else {
        edge('LR_COMBO', false);
      }
      if (stPressed && zPressed) {
        if (edge('STZ_COMBO', true)) action('OPEN_MAPPING');
      } else {
        edge('STZ_COMBO', false);
      }

      // Shoulder buttons (only when not in chord)
      if (!rPressed && edge('L', lPressed)) { const a = getAction('L'); if (a && a !== 'NONE') tryFire('L', a); }
      if (!lPressed && edge('R', rPressed)) { const a = getAction('R'); if (a && a !== 'NONE') tryFire('R', a); }

      // Hat axis D-pad (Windows) — fires on direction change, same as button edge
      if (hatChanged && hatDir) {
        const a = getAction(hatDir);
        if (a && a !== 'NONE') tryFire(hatDir, a);
      }

      // D-pad buttons (Mac / XInput) — 12=Up 13=Down 14=Left 15=Right
      if (edge('DU', b[12]?.pressed)) { const a = getAction('DU'); if (a && a !== 'NONE') tryFire('DU', a); }
      if (edge('DD', b[13]?.pressed)) { const a = getAction('DD'); if (a && a !== 'NONE') tryFire('DD', a); }
      if (edge('DL', b[14]?.pressed)) { const a = getAction('DL'); if (a && a !== 'NONE') tryFire('DL', a); }
      if (edge('DR', b[15]?.pressed)) { const a = getAction('DR'); if (a && a !== 'NONE') tryFire('DR', a); }

      // C-buttons — CUp(0) CRight(1) CDown(2) CLeft(3)
      if (edge('CU', b[0]?.pressed))  { const a = getAction('CU'); if (a && a !== 'NONE') tryFire('CU', a); }
      if (edge('CR', b[1]?.pressed))  { const a = getAction('CR'); if (a && a !== 'NONE') tryFire('CR', a); }
      if (edge('CD', b[2]?.pressed))  { const a = getAction('CD'); if (a && a !== 'NONE') tryFire('CD', a); }
      if (edge('CL', b[3]?.pressed))  { const a = getAction('CL'); if (a && a !== 'NONE') tryFire('CL', a); }

      // Face buttons (only when not in chord)
      if (edge('A',  b[6]?.pressed))  { const a = getAction('A');  if (a && a !== 'NONE') tryFire('A',  a); }
      if (edge('B',  b[8]?.pressed))  { const a = getAction('B');  if (a && a !== 'NONE') tryFire('B',  a); }
      if (!zPressed  && edge('ST', stPressed)) { const a = getAction('ST'); if (a && a !== 'NONE') tryFire('ST', a); }
      if (!stPressed && edge('Z',  zPressed))  { const a = getAction('Z');  if (a && a !== 'NONE') tryFire('Z',  a); }
    }
  }

  requestAnimationFrame(pollGamepad);
}

// ══════════════════════════════════════════════════════════
// DEBUG OVERLAY
// ══════════════════════════════════════════════════════════

function initDebug(pad) {
  const el = document.getElementById('debug-btns');
  el.innerHTML = '';
  pad.buttons.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'dbtn'; d.id = `dbtn-${i}`; d.textContent = `B${i}`;
    el.appendChild(d);
  });
}

function updateDebug(pad) {
  if (document.getElementById('debug-btns').children.length !== pad.buttons.length) initDebug(pad);
  pad.buttons.forEach((b,i) => {
    const el = document.getElementById(`dbtn-${i}`);
    if (el) el.classList.toggle('pressed', b.pressed);
  });
  document.getElementById('debug-axes').textContent =
    pad.axes.map((v,i)=>`A${i}:${v.toFixed(2)}`).join('  ');
}

function setDebugLast(name) {
  if (debugVisible) document.getElementById('debug-last').textContent = `Last: ${name}`;
}

function toggleDebug() {
  debugVisible = !debugVisible;
  document.getElementById('debug-overlay').classList.toggle('visible', debugVisible);
}

// ══════════════════════════════════════════════════════════
// KEYBOARD FALLBACK
// ══════════════════════════════════════════════════════════

document.addEventListener('keydown', e => {
  if (e.repeat) return;
  const map = {
    KeyQ:'PREV_SCREEN', KeyE:'NEXT_SCREEN',
    ArrowUp:'UP', ArrowDown:'DOWN',
    ArrowLeft:'LEFT', ArrowRight:'RIGHT',
    Space:'A', Backspace:'B',
    Enter:'START', KeyZ:'Z',
    KeyR:'REFRESH', KeyM:'OPEN_MAPPING',
  };
  if (map[e.code]) { e.preventDefault(); action(map[e.code]); }
  if (e.code === 'KeyD') toggleDebug();
});

renderBpSelector();
